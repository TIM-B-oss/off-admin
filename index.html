<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Администрация</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page">
        <header class="page-header">
            <div class="header-top">
                <div class="header-text">
                    <h1>Администрация</h1>
                    <p>Мониторинг действующих администраторов сервера</p>
                </div>
                <button id="themeToggleBtn" class="theme-toggle-btn">
                    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2.5M12 19.5V22M4.93 4.93l1.77 1.77M17.3 17.3l1.77 1.77M2 12h2.5M19.5 12H22M4.93 19.07l1.77-1.77M17.3 6.7l1.77-1.77"></path></svg>
                    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.8A9 9 0 1 1 11.2 3c-.1.5-.2 1-.2 1.5a8.5 8.5 0 0 0 8.5 8.5c.5 0 1 0 1.5-.2Z"></path></svg>
                </button>
            </div>
        </header>

        <main class="card">
            <!-- Кнопки выбора сервера -->
            <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
                <button class="server-tab-btn active" data-server="spb" id="btnSpb">Невский</button>
                <button class="server-tab-btn" data-server="ekb" id="btnEkb">Екатеринбург</button>
            </div>

            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="Поиск по нику..." />
            </div>

            <div class="table-shell">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>НИКНЕЙМ</th>
                            <th>УРОВЕНЬ</th>
                            <th>СТАТУС</th>
                            <th>VK</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <button id="openAdminPanelBtn" class="admin-fab">⚙️</button>

    <div id="adminPanel" class="admin-panel">
        <div id="adminPanelContent" class="admin-panel-content login-mode">
            <div class="admin-panel-header">
                <h2>Панель администратора</h2>
                <button id="closeAdminPanel" class="close-btn">&times;</button>
            </div>

            <!-- Форма входа -->
            <div id="loginForm" class="login-block">
                <input type="text" id="adminLogin" placeholder="Логин" />
                <input type="password" id="adminPassword" placeholder="Пароль" />
                <button id="loginBtn" class="primary-btn">Войти</button>
                <p id="loginError" class="error-message"></p>
            </div>

            <!-- Админка -->
            <div id="adminControls" class="admin-controls" style="display:none;">
                <div class="admin-topbar">
                    <span id="currentUserInfo"></span>
                    <button id="logoutBtn" class="danger-btn" style="width: auto; padding: 0 15px;">Выход</button>
                </div>

                <div class="control-section">
                    <h3>Добавить/Импорт</h3>
                    <label>Выберите сервер:</label>
                    <select id="actionServer" style="width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border);">
                        <option value="spb">Невский</option>
                        <option value="ekb">Екатеринбург</option>
                    </select>
                    
                    <textarea id="bulkAdminText" placeholder="Ник [TAB] Уровень [TAB] Статус [TAB] VK" rows="4"></textarea>
                    <button id="bulkImportBtn" class="primary-btn">Импортировать список</button>
                    <hr style="margin: 15px 0; border: 0; border-top: 1px solid var(--border);">
                    <input type="text" id="addNickname" placeholder="Ник" />
                    <input type="number" id="addLevel" placeholder="Уровень" />
                    <input type="text" id="addStatus" placeholder="Статус" />
                    <input type="text" id="addVk" placeholder="VK" />
                    <button id="addAdminBtn" class="secondary-btn">Добавить одного</button>
                </div>

                <div class="control-section">
                    <h3>Редактировать</h3>
                    <input type="text" id="editNicknameSearch" placeholder="Ник для поиска" />
                    <button id="loadAdminBtn" class="secondary-btn">Загрузить</button>
                    <div id="editFields" style="display:none; margin-top:10px;">
                        <select id="editServer" style="width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 8px;">
                            <option value="spb">Невский</option>
                            <option value="ekb">Екатеринбург</option>
                        </select>
                        <input type="text" id="editNickname" placeholder="Ник">
                        <input type="number" id="editLevel" placeholder="Уровень">
                        <input type="text" id="editStatus" placeholder="Статус">
                        <input type="text" id="editVk" placeholder="VK">
                        <input type="number" id="editSortOrder" placeholder="Порядок">
                        <button id="updateAdminBtn" class="primary-btn">Обновить</button>
                        <button id="deleteAdminBtn" class="danger-btn" style="margin-top:5px;">Удалить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
