<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Администрация</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="page">
<header class="page-header">
<div class="header-top">
<div class="header-text">
<h1>Администрация</h1>
<p>Мониторинг действующих администраторов сервера</p>
</div>
</div>
</header>

<main class="card">

<div class="server-switch">
<button class="server-btn active" data-city="spb">Невский</button>
<button class="server-btn" data-city="ekb">Екатеринбург</button>
</div>

<div class="search-wrap">
<input type="text" id="searchInput" placeholder="Поиск по нику админа..." />
</div>

<div class="table-shell">
<table class="admin-table">
<thead>
<tr>
<th>ИГРОВОЙ НИК</th>
<th>УРОВЕНЬ</th>
<th>СТАТУС</th>
<th>VK</th>
</tr>
</thead>
<tbody id="adminTableBody"></tbody>
</table>
</div>

</main>
</div>

<div id="adminPanel" class="admin-panel">
<div id="adminPanelContent" class="admin-panel-content login-mode">

<div class="admin-panel-header">
<h2>Панель администратора</h2>
<button id="closeAdminPanel" class="close-btn">&times;</button>
</div>

<div id="loginForm" class="login-block">
<input type="text" id="adminLogin" placeholder="Логин" />
<input type="password" id="adminPassword" placeholder="Пароль" />
<button id="loginBtn" class="primary-btn">Войти</button>
<p id="loginError" class="error-message"></p>
</div>

<div id="adminControls" class="admin-controls" style="display:none;">

<div class="control-section">
<h3>Массовое добавление</h3>

<select id="bulkCity">
<option value="spb">Невский</option>
<option value="ekb">Екатеринбург</option>
</select>

<textarea id="bulkAdminText" rows="8"></textarea>
<button id="bulkImportBtn" class="primary-btn">Импортировать</button>
</div>

<div class="control-section">
<h3>Добавить администратора</h3>

<select id="addCity">
<option value="spb">Невский</option>
<option value="ekb">Екатеринбург</option>
</select>

<input type="text" id="addNickname" placeholder="Ник" />
<input type="number" id="addLevel" placeholder="Уровень" />
<input type="text" id="addStatus" placeholder="Статус" />
<input type="text" id="addVk" placeholder="VK" />
<button id="addAdminBtn" class="primary-btn">Добавить</button>
</div>

<div class="control-section">
<h3>Редактировать</h3>
<input type="text" id="editNicknameSearch" placeholder="Введите ник" />
<button id="loadAdminBtn" class="secondary-btn">Загрузить</button>

<div id="editFields" style="display:none; margin-top:10px;">
<select id="editCity">
<option value="spb">Невский</option>
<option value="ekb">Екатеринбург</option>
</select>
<input type="text" id="editNickname" />
<input type="number" id="editLevel" />
<input type="text" id="editStatus" />
<input type="text" id="editVk" />
<button id="updateAdminBtn" class="primary-btn">Обновить</button>
<button id="deleteAdminBtn" class="danger-btn">Удалить</button>
</div>
</div>

</div>
</div>
</div>

<button id="openAdminPanelBtn" class="admin-fab">⚙</button>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
