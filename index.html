<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Администрация</title>
<link rel="stylesheet" href="styles.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="page">
<header class="page-header">
<div class="header-top">
<div class="header-text">
<h1>Администрация</h1>
<p>Мониторинг действующих администраторов сервера</p>
</div>
</div>
</header>

<main class="card">

<div class="server-switch">
<button class="server-btn active" data-city="spb">Невский</button>
<button class="server-btn" data-city="ekb">Екатеринбург</button>
</div>

<div class="search-wrap">
<input type="text" id="searchInput" placeholder="Поиск по нику админа..." />
</div>

<div class="table-shell">
<table class="admin-table">
<thead>
<tr>
<th>ИГРОВОЙ НИК</th>
<th>УРОВЕНЬ</th>
<th>СТАТУС</th>
<th>VK</th>
</tr>
</thead>
<tbody id="adminTableBody"></tbody>
</table>
</div>

</main>
</div>

<button id="openAdminPanelBtn" class="admin-fab">⚙</button>

<div id="adminPanel" class="admin-panel">
<div class="admin-panel-content admin-mode">

<div class="admin-panel-header">
<h2>Панель администратора</h2>
<button id="closeAdminPanel" class="close-btn">&times;</button>
</div>

<div class="admin-controls">

<div class="control-section">
<h3>Массовое добавление</h3>

<select id="bulkCity" class="server-select">
<option value="spb">Невский</option>
<option value="ekb">Екатеринбург</option>
</select>

<textarea id="bulkAdminText" rows="8" placeholder="Ник	Уровень	Статус	VK"></textarea>
<button id="bulkImportBtn" class="primary-btn">Импортировать</button>
</div>

<div class="control-section">
<h3>Добавить администратора</h3>

<select id="addCity" class="server-select">
<option value="spb">Невский</option>
<option value="ekb">Екатеринбург</option>
</select>

<input type="text" id="addNickname" placeholder="Игровой ник" />
<input type="number" id="addLevel" placeholder="Уровень" min="1" max="8" />
<input type="text" id="addStatus" placeholder="Статус" />
<input type="text" id="addVk" placeholder="VK ссылка" />
<button id="addAdminBtn" class="primary-btn">Добавить</button>
</div>

</div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="script.js"></script>
</body>
</html>
