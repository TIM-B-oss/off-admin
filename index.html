<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Администрация</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="page">
    <header class="page-header">
        <div class="header-top">
            <div class="header-text">
                <h1>Администрация</h1>
                <p>Мониторинг действующих администраторов</p>
            </div>

            <button id="themeToggleBtn" class="theme-toggle-btn">🌓</button>
        </div>
    </header>

    <main class="card">
        <button id="serverBadgeBtn" class="single-server-badge"></button>

        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="Поиск по нику..." />
        </div>

        <div class="table-shell">
            <table class="admin-table">
                <thead>
                <tr>
                    <th>НИК</th>
                    <th>УРОВЕНЬ</th>
                    <th>СТАТУС</th>
                    <th>VK</th>
                </tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </main>
</div>

<button id="openAdminPanelBtn" class="admin-fab">⚙</button>

<div id="adminPanel" class="admin-panel">
    <div class="admin-panel-content">
        <div class="admin-panel-header">
            <h2>Админ панель</h2>
            <button id="closeAdminPanel">✕</button>
        </div>

        <div class="admin-controls">
            <input type="text" id="addNickname" placeholder="Ник" />
            <input type="number" id="addLevel" placeholder="Уровень 1-8" />
            <input type="text" id="addStatus" placeholder="Статус" />
            <input type="text" id="addVk" placeholder="VK ссылка" />
            <button id="addAdminBtn" class="primary-btn">Добавить</button>

            <p id="actionMessage" class="action-message"></p>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="script.js"></script>

</body>
</html>
