<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Администрация</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body data-theme="light">
    <div class="page">
        <header class="page-header">
            <div class="header-top">
                <div style="width: 46px;"></div> <!-- Отступ для центровки -->
                <div class="header-text">
                    <h1>Администрация</h1>
                    <p>Мониторинг действующих администраторов сервера</p>
                </div>
                <button id="themeToggleBtn" class="theme-toggle-btn">
                    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></svg>
                    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </header>

        <main class="card">
            <!-- ВЫБОР СЕРВЕРА -->
            <div class="server-tabs">
                <button class="server-btn active" id="btnSpb" data-server="spb">Невский</button>
                <button class="server-btn" id="btnEkb" data-server="ekb">Екатеринбург</button>
            </div>

            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="Поиск администратора по нику...">
            </div>

            <div class="table-shell">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ИГРОВОЙ НИК</th>
                            <th>УРОВЕНЬ</th>
                            <th>СТАТУС</th>
                            <th>VK СВЯЗЬ</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <!-- Данные загрузятся здесь -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- КНОПКА АДМИНКИ -->
    <button id="openAdminPanelBtn" class="admin-fab">⚙️</button>

    <!-- ПАНЕЛЬ -->
    <div id="adminPanel" class="admin-panel">
        <div id="adminPanelContent" class="admin-panel-content">
            <div class="admin-panel-header">
                <h2 id="panelTitle">Панель управления</h2>
                <button id="closeAdminPanel" class="close-btn">&times;</button>
            </div>

            <!-- ВХОД -->
            <div id="loginForm" class="login-block">
                <input type="text" id="adminLogin" placeholder="Ваш логин">
                <input type="password" id="adminPassword" placeholder="Ваш пароль">
                <button id="loginBtn" class="primary-btn">Войти в панель</button>
                <p id="loginError" class="error-message">Неверный логин или пароль</p>
            </div>

            <!-- УПРАВЛЕНИЕ -->
            <div id="adminControls" class="admin-controls" style="display: none;">
                <p id="currentUserInfo" style="margin-bottom: 15px; font-weight: 700; color: var(--primary);"></p>
                
                <div class="control-section">
                    <h3>Добавить администратора</h3>
                    <label style="font-size: 12px; color: var(--muted);">Выберите сервер:</label>
                    <select id="addAdminServer">
                        <option value="spb">Невский</option>
                        <option value="ekb">Екатеринбург</option>
                    </select>
                    <div class="grid-2">
                        <input type="text" id="addNickname" placeholder="Никнейм">
                        <input type="number" id="addLevel" placeholder="Уровень">
                    </div>
                    <input type="text" id="addStatus" placeholder="Статус (Напр: Следящий)">
                    <input type="text" id="addVk" placeholder="Ссылка на VK">
                    <button id="addAdminBtn" class="primary-btn">Добавить в базу</button>
                </div>

                <div class="control-section">
                    <h3>Редактировать / Удалить</h3>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="editSearch" placeholder="Ник для поиска">
                        <button id="loadAdminBtn" class="secondary-btn" style="width: 100px;">Найти</button>
                    </div>
                    
                    <div id="editFields" style="display: none;">
                        <label style="font-size: 12px; color: var(--muted);">Сервер:</label>
                        <select id="editAdminServer">
                            <option value="spb">Невский</option>
                            <option value="ekb">Екатеринбург</option>
                        </select>
                        <input type="text" id="editNickname" placeholder="Никнейм">
                        <div class="grid-2">
                            <input type="number" id="editLevel" placeholder="Уровень">
                            <input type="number" id="editSortOrder" placeholder="Порядок (1, 2...)">
                        </div>
                        <input type="text" id="editStatus" placeholder="Статус">
                        <input type="text" id="editVk" placeholder="Ссылка на VK">
                        <button id="updateAdminBtn" class="primary-btn">Обновить данные</button>
                        <button id="deleteAdminBtn" class="danger-btn">Удалить из базы</button>
                    </div>
                </div>

                <button id="logoutBtn" class="secondary-btn">Выйти из аккаунта</button>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
