<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Администрация</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body data-theme="light">
    <div class="page">
        <header class="page-header">
            <div class="header-top">
                <div class="header-text">
                    <h1>Администрация</h1>
                    <p>Мониторинг действующих администраторов сервера</p>
                </div>
                <button id="themeToggleBtn" class="theme-toggle-btn" type="button">
                    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2.5M12 19.5V22M4.93 4.93l1.77 1.77M17.3 17.3l1.77 1.77M2 12h2.5M19.5 12H22M4.93 19.07l1.77-1.77M17.3 6.7l1.77-1.77"></path></svg>
                    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.8A9 9 0 1 1 11.2 3c-.1.5-.2 1-.2 1.5a8.5 8.5 0 0 0 8.5 8.5c.5 0 1 0 1.5-.2Z"></path></svg>
                </button>
            </div>
        </header>

        <main class="card">
            <div class="server-switcher">
                <button class="server-tab active" data-server="Невский">Невский</button>
                <button class="server-tab" data-server="Екатеринбург">Екатеринбург</button>
            </div>

            <div class="search-wrap">
                <input type="text" id="searchInput" placeholder="Поиск по нику админа..." />
            </div>

            <div class="table-shell">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ИГРОВОЙ НИК</th>
                            <th>УРОВЕНЬ</th>
                            <th>СТАТУС</th>
                            <th>VK</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <button id="openAdminPanelBtn" class="admin-fab" title="Админ-панель">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c0 .66.39 1.26 1 1.51.16.06.33.09.51.09H21a2 2 0 1 1 0 4h-.09c-.18 0-.35.03-.51.09-.61.25-1 .85-1 1.51Z"/></svg>
    </button>

    <div id="adminPanel" class="admin-panel">
        <div id="adminPanelContent" class="admin-panel-content login-mode">
            <div class="admin-panel-header">
                <div class="admin-header-left">
                    <svg class="admin-header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    <div>
                        <h2>Панель администратора</h2>
                        <p>Управление списком администрации</p>
                    </div>
                </div>
                <button id="closeAdminPanel" class="close-btn">&times;</button>
            </div>

            <div id="loginForm" class="login-block">
                <label>Логин</label>
                <input type="text" id="adminLogin" placeholder="Введите логин" />
                <label>Пароль</label>
                <input type="password" id="adminPassword" placeholder="Введите пароль" />
                <button id="loginBtn" class="primary-btn">Войти</button>
                <p id="loginError" class="error-message"></p>
            </div>

            <div id="adminControls" class="admin-controls" style="display:none;">
                <div class="admin-topbar">
                    <div>
                        <div class="admin-topbar-title">Админ-сессия активна</div>
                        <div id="currentUserInfo" class="current-user-info"></div>
                    </div>
                    <button id="logoutBtn" class="secondary-btn logout-btn">Выйти</button>
                </div>

                <div class="admin-tabs">
                    <button id="adminsTabBtn" class="admin-tab-btn active">Администраторы</button>
                    <button id="logsTabBtn" class="admin-tab-btn">Логи входа</button>
                </div>

                <div id="adminsTab" class="admin-tab-content">
                    <div class="grid-2">
                        <div class="control-section">
                            <h3>Массовый импорт</h3>
                            <label>Данные (Ник | Ур | Статус | VK)</label>
                            <textarea id="bulkAdminText" rows="6" placeholder="Typhoon	10	Ген.Дир	https://vk.com/id1"></textarea>
                            <button id="bulkImportBtn" class="primary-btn">Импортировать</button>
                        </div>

                        <div class="control-section">
                            <h3>Новый администратор</h3>
                            <label>Сервер</label>
                            <select id="addServer">
                                <option value="Невский">Невский</option>
                                <option value="Екатеринбург">Екатеринбург</option>
                            </select>
                            <input type="number" id="addOrder" placeholder="Позиция (1 - самый верх)" />
                            <input type="text" id="addNickname" placeholder="Игровой ник" />
                            <input type="number" id="addLevel" placeholder="Уровень" />
                            <input type="text" id="addStatus" placeholder="Статус" />
                            <input type="text" id="addVk" placeholder="VK ссылка" />
                            <button id="addAdminBtn" class="primary-btn">Добавить</button>
                        </div>
                    </div>

                    <div class="control-section">
                        <h3>Редактирование</h3>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="editNicknameSearch" placeholder="Ник для поиска" />
                            <button id="loadAdminBtn" class="secondary-btn" style="width:auto; padding:0 20px;">Найти</button>
                        </div>

                        <div id="editFields" style="display:none; margin-top:14px;">
                            <div class="grid-2">
                                 <div>
            <label>Позиция в списке</label>
            <input type="number" id="editOrder" placeholder="Позиция" />
        </div>
                                <div>
                                    <label>Сервер (Перенос)</label>
                                    <select id="editServer">
                                        <option value="Невский">Невский</option>
                                        <option value="Екатеринбург">Екатеринбург</option>
                                    </select>
                                </div>
                                <div>
                                    <label>Игровой ник</label>
                                    <input type="text" id="editNickname" />
                                </div>
                                <div>
                                    <label>Уровень</label>
                                    <input type="number" id="editLevel" />
                                </div>
                                <div>
                                    <label>Статус</label>
                                    <input type="text" id="editStatus" />
                                </div>
                                <div>
                                    <label>VK ссылка</label>
                                    <input type="text" id="editVk" />
                                </div>
                            </div>
                            <div class="button-row">
                                <button id="updateAdminBtn" class="primary-btn">Сохранить</button>
                                <button id="deleteAdminBtn" class="danger-btn">Удалить</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="logsTab" class="admin-tab-content" style="display:none;">
                    <div class="table-shell">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>ИМЯ</th>
                                    <th>ДЕЙСТВИЕ</th>
                                    <th>ДАТА</th>
                                </tr>
                            </thead>
                            <tbody id="loginLogsTableBody"></tbody>
                        </table>
                    </div>
                </div>
                <p id="actionMessage" class="action-message"></p>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
